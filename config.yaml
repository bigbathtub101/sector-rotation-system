# --------------------------------------------------------------------------
# FRED MACROECONOMIC SERIES
# --------------------------------------------------------------------------
fred:
  series:
    federal_funds_rate: "FEDFUNDS"
    treasury_spread_10y2y: "T10Y2Y"
    cpi_yoy: "CPIAUCSL"
    unemployment_rate: "UNRATE"
    cfnai: "CFNAI"
    industrial_production: "INDPRO"
  # FRED API key read from environment variable FRED_API_KEY
  # Register free at https://fred.stlouisfed.org/docs/api/api_key.html

# --------------------------------------------------------------------------
# SEC EDGAR SETTINGS
# --------------------------------------------------------------------------
sec_edgar:
  user_agent: "QuantSystemBuilder/1.0 (your_email@domain.com)"
  rate_limit_sleep: 0.15        # seconds between API calls (10 req/s limit)
  filing_types:
    - "10-K"
    - "8-K"
  max_filings_per_ticker: 2     # Most recent N filings per ticker (keeps NLP fresh, reduces load)
  download_retries: 3           # Retry attempts for 503/timeout on document downloads
  retry_backoff_base: 2         # Exponential backoff base (2s, 4s, 8s)
  top_holdings_per_etf: 5       # Number of top holdings to pull filings for
  max_fetch_time_seconds: 300    # Global time budget for SEC fetch (prevents hangs)
  base_url: "https://data.sec.gov/submissions/"
  archives_url: "https://www.sec.gov/Archives/edgar/data/"

# --------------------------------------------------------------------------
# REGIME DETECTION PARAMETERS (Section 2, 8.2)
# --------------------------------------------------------------------------
regime:
  wedge_volume:
    rolling_window: 63              # Trading days for demeaned log-return vectors
    percentile_lookback: 252        # Trading days for percentile normalization
  thresholds:
    panic_upper: 5                  # Percentile: below this = Panic zone
    defense_upper: 30               # Percentile: below this = Defense zone
    panic_probability_anchor: 8     # Probability scoring anchor for Panic
    offense_probability_anchor: 25  # Probability scoring anchor for Offense
  confirmation:
    consecutive_days: 2             # Days required to confirm regime transition
    whipsaw_buffer: 3               # Percentile floor for Panic confirmation (Section 8.2)
  fast_shock:
    vix_rv_ratio_threshold: 1.5    # VIX / 21-day realized vol ratio for Fast Shock
    rv_window: 21                   # Days for realized volatility calculation

# --------------------------------------------------------------------------
# FACTOR MODEL PARAMETERS (Section 3)
# --------------------------------------------------------------------------
factor_model:
  rolling_window_months: 36         # Rolling OLS regression window
  mclean_pontiff_decay: 0.74       # Post-publication decay multiplier
  momentum:
    lookback_months: 12
    skip_months: 1                  # 12-1 month momentum (skip most recent month)
  valuation:
    discount_rate: 0.08             # 8% discount rate for implied growth calculation
    momentum_only_percentile: 75    # Above this = "momentum tilt only"
    avoid_percentile: 90            # Above this = AVOID label
    momentum_cap_fraction: 0.75     # Was 0.50 — reduce penalty for momentum-only (growth bias)

# --------------------------------------------------------------------------
# CVaR OPTIMIZATION PARAMETERS (Section 5, 8.1)
# --------------------------------------------------------------------------
# AGGRESSIVE PROFILE: 95-100% equity in Offense, 15-30% cash in Defense
# --------------------------------------------------------------------------
optimizer:
  cvar_confidence: 0.95             # 95% CVaR
  tail_correlation_percentile: 10   # Longin-Solnik: joint returns below 10th percentile
  max_positions: 15                        # Maximum portfolio positions (FIX: was uncapped → 53 positions)
  max_screener_picks: 5                    # Maximum individual stocks injected from screener (FIX B)
  min_position_pct: 3.0                    # Drop and redistribute positions below this % (critique fix)
  em_weight_reduction_range: [0.20, 0.35]  # Expected EM reduction vs. naive CVaR

  # Regime-conditional allocation bands — AGGRESSIVE GROWTH
  # The sum of all asset class upper bounds should allow ≥95% equity in Offense.
  allocation_bands:
    us_equities:
      panic: [0.05, 0.15]          # Was [0.00, 0.05] — keep skin in the game
      defense: [0.20, 0.40]        # Was [0.10, 0.25] — stay more invested
      offense: [0.55, 0.75]        # Was [0.40, 0.60] — aggressive core
    intl_developed:
      panic: [0.00, 0.05]          # Was [0.00, 0.00] — small intl hedge
      defense: [0.05, 0.15]        # Unchanged
      offense: [0.20, 0.30]        # Was [0.15, 0.25] — lean into cheap intl valuations
    em_equities:
      panic: [0.00, 0.02]          # Was [0.00, 0.00] — tiny EM position OK
      defense: [0.02, 0.10]        # Was [0.00, 0.08]
      offense: [0.10, 0.20]        # Was [0.08, 0.15] — more EM upside
    energy_materials:
      panic: [0.00, 0.05]          # Unchanged
      defense: [0.05, 0.15]        # Unchanged
      offense: [0.10, 0.20]        # Unchanged
    healthcare:
      panic: [0.05, 0.15]          # Was [0.05, 0.10] — healthcare as defense
