# REGIME DETECTION PARAMETERS
# --------------------------------------------------------------------------
regime:
  wedge_volume:
    rolling_window: 63
    percentile_lookback: 252
  thresholds:
    panic_upper: 5
    defense_upper: 30
    panic_probability_anchor: 8
    offense_probability_anchor: 25
  confirmation:
    consecutive_days: 2
    whipsaw_buffer: 3
  fast_shock:
    vix_rv_ratio_threshold: 1.5
