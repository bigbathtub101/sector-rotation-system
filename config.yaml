monitor:
  rebalance_threshold_bps: 300      # Raised from 200 -- individual stocks (HUBS, XYZ) move fast
  entry_window_threshold_bps: 300
  extended_defense_days: 60
  panic_exit_sequence:
    immediate_pct: 0.50
    remainder_days: [3, 5]
  run_time_et: "16:30"

# --------------------------------------------------------------------------
# DATA QUALITY THRESHOLDS
# --------------------------------------------------------------------------
data_quality:
  stale_sector_etf_limit: 3
  backfill_method: "last_valid"

# --------------------------------------------------------------------------
# ALERT DELIVERY
# --------------------------------------------------------------------------
alerts:
  telegram:
    enabled: true
  email:
    enabled: true
  google_sheets:
    spreadsheet_name: "Sector Rotation Daily Log"
    enabled: true

# --------------------------------------------------------------------------
# BACKTEST PARAMETERS
# --------------------------------------------------------------------------
backtest:
  mclean_pontiff_label: "(in-sample, apply 26% McLean-Pontiff decay to alpha differential for forward estimate)"
  stress_tests:
    policy_shock:
      sp500_drop_threshold: -0.03
      wedge_volume_pre_threshold: 15
    incomplete_panic:
      analog_year: 2022
    extended_bull:
      duration_years: 10
      annual_drag_range: [0.005, 0.012]

# --------------------------------------------------------------------------
# PROBABILISTIC TRIGGER PARAMETERS
# --------------------------------------------------------------------------
probabilistic_triggers:
  regime_persistence_days: 2
  whipsaw_buffer_percentile: 3
  upgrade_path_trigger: 15

# --------------------------------------------------------------------------
# STOCK SCREENER PARAMETERS
# --------------------------------------------------------------------------
stock_screener:
  top_holdings_count: 20
  min_price_history_days: 252
  watchlist_pos_pct: 0.04
  roth_satellite_pct: 0.20          # 20% of Roth IRA ($46,207) = ~$9,241 for screener picks
  satellite_stock_count: 5          # Top 5 picks: currently HUBS, XYZ, BMRN, FIS, NVDA
  scoring_weights:
    momentum: 0.30
    quality: 0.25
    value: 0.25
    size: 0.20
  valuation_filter:
    discount_rate: 0.08
    momentum_only_percentile: 75
    avoid_percentile: 90
  entry_signal:
    min_factor_score_percentile: 75
    require_fundamental_buy: true
    require_offense_regime: true
  exit_signal:
    momentum_bottom_percentile: 25
    trigger_on_defense_rotation: true

