# ============================================================================
# Global Sector Rotation System — Master Configuration
# ============================================================================
# All thresholds, parameters, and lists are configurable here.
# No magic numbers in the codebase — everything references this file.
# ============================================================================

# --------------------------------------------------------------------------
# PORTFOLIO CONTEXT
# --------------------------------------------------------------------------
portfolio:
  total_value: 144000
  accounts:
    taxable:
      value: 100000
      type: "Individual Brokerage"
      tax_treatment: "Capital gains taxed; long-term preferred"
    roth_ira:
      value: 44000
      type: "Retirement"
      tax_treatment: "All growth permanently tax-free"

# --------------------------------------------------------------------------
# TAX-LOCATION RULES
# --------------------------------------------------------------------------
tax_location:
  roth_ira_first:
    - "individual_stocks_thematic"      # Biotech, AI, Defense, Materials individual names
    - "high_turnover"                   # Momentum-driven, expected hold < 12 months
    - "biotech_smallcap"                # Highest volatility and rebalancing frequency
    - "momentum_tilt_only"              # Flagged as momentum, not fundamental overweight
  taxable:
    - "broad_etf_longterm"              # Broad ETFs held > 12 months
    - "geographic_etf"                  # EEM, INDA, EWZ, VGK — foreign tax credit eligible
    - "cash_short_duration"             # BIL, short-duration fixed income
    - "energy_materials_etf"            # Lower turnover, structural diversifier
    - "tax_loss_harvest_candidate"      # Positions with TLH opportunity
  split_threshold: 10000               # Never split a position across accounts unless > $10k

# --------------------------------------------------------------------------
# TICKER UNIVERSES
# --------------------------------------------------------------------------
tickers:
  sector_etfs:
    - XLK   # Technology
    - XLV   # Healthcare
    - XLE   # Energy
    - XLF   # Financials
    - XLI   # Industrials
    - XLB   # Materials
    - XLU   # Utilities
    - XLP   # Consumer Staples
    - XLRE  # Real Estate
    - XLC   # Communication Services
    - XLY   # Consumer Discretionary

  geographic_etfs:
    - EEM   # Emerging Markets
    - INDA  # India
    - EWZ   # Brazil
    - VGK   # Europe
    - FXI   # China Large-Cap
    - EWY   # South Korea
    - EWT   # Taiwan

  factor_etfs:
    - MTUM  # Momentum
    - VLUE  # Value
    - USMV  # Min Volatility
    - QUAL  # Quality
    - SIZE  # Size

  volatility:
    - "^VIX"
    - "^VIX3M"

  benchmarks:
    - SPY   # S&P 500
    - QQQ   # Nasdaq 100
    - IWM   # Russell 2000
    - AGG   # Aggregate Bond
    - GLD   # Gold
    - TLT   # 20+ Year Treasury
    - BIL   # 1-3 Month T-Bill

  # Thematic watchlists — seed tickers (validated and expanded in Phase 3B)
  watchlist_biotech:
    - NBIX   # Neurocrine Biosciences
    - EXEL   # Exelixis
    - HALO   # Halozyme
    - ITCI   # Intra-Cellular Therapies
    - SRPT   # Sarepta Therapeutics

  watchlist_ai_software:
    - CRWD   # CrowdStrike
    - PANW   # Palo Alto Networks (validate market cap)
    - PLTR   # Palantir (validate valuation)
    - NET    # Cloudflare
    - DDOG   # Datadog

  watchlist_defense:
    - RTX    # Raytheon Technologies
    - LMT    # Lockheed Martin
    - BAESY  # BAE Systems ADR
    - ASML   # Semiconductor Equipment
    - ROK    # Rockwell Automation

  watchlist_green_materials:
    - ALB    # Albemarle (lithium)
    - FCX    # Freeport-McMoRan (copper)
    - SQM    # Sociedad Química (lithium/Chile)
    - SCCO   # Southern Copper
    - WPM    # Wheaton Precious Metals

# --------------------------------------------------------------------------
# FRED MACROECONOMIC SERIES
# --------------------------------------------------------------------------
fred:
  series:
    federal_funds_rate: "FEDFUNDS"
    treasury_spread_10y2y: "T10Y2Y"
    cpi_yoy: "CPIAUCSL"
    unemployment_rate: "UNRATE"
    cfnai: "CFNAI"
    industrial_production: "INDPRO"
  # FRED API key read from environment variable FRED_API_KEY
  # Register free at https://fred.stlouisfed.org/docs/api/api_key.html

# --------------------------------------------------------------------------
# SEC EDGAR SETTINGS
# --------------------------------------------------------------------------
sec_edgar:
  user_agent: "QuantSystemBuilder/1.0 (your_email@domain.com)"
  rate_limit_sleep: 0.15        # seconds between API calls (10 req/s limit)
  filing_types:
    - "10-K"
    - "8-K"
  top_holdings_per_etf: 5       # Number of top holdings to pull filings for
  base_url: "https://data.sec.gov/submissions/"
  archives_url: "https://www.sec.gov/Archives/edgar/data/"

# --------------------------------------------------------------------------
# REGIME DETECTION PARAMETERS (Section 2, 8.2)
# --------------------------------------------------------------------------
regime:
  wedge_volume:
    rolling_window: 63              # Trading days for demeaned log-return vectors
    percentile_lookback: 252        # Trading days for percentile normalization
  thresholds:
    panic_upper: 5                  # Percentile: below this = Panic zone
    defense_upper: 30               # Percentile: below this = Defense zone
    panic_probability_anchor: 8     # Probability scoring anchor for Panic
    offense_probability_anchor: 25  # Probability scoring anchor for Offense
  confirmation:
    consecutive_days: 2             # Days required to confirm regime transition
    whipsaw_buffer: 3               # Percentile floor for Panic confirmation (Section 8.2)
  fast_shock:
    vix_rv_ratio_threshold: 1.5    # VIX / 21-day realized vol ratio for Fast Shock
    rv_window: 21                   # Days for realized volatility calculation

# --------------------------------------------------------------------------
# FACTOR MODEL PARAMETERS (Section 3)
# --------------------------------------------------------------------------
factor_model:
  rolling_window_months: 36         # Rolling OLS regression window
  mclean_pontiff_decay: 0.74       # Post-publication decay multiplier
  momentum:
    lookback_months: 12
    skip_months: 1                  # 12-1 month momentum (skip most recent month)
  valuation:
    discount_rate: 0.08             # 8% discount rate for implied growth calculation
    momentum_only_percentile: 75    # Above this = "momentum tilt only"
    avoid_percentile: 90            # Above this = AVOID label
    momentum_cap_fraction: 0.50     # Cap at 50% of equal-weight if momentum-only

# --------------------------------------------------------------------------
# CVaR OPTIMIZATION PARAMETERS (Section 5, 8.1)
# --------------------------------------------------------------------------
optimizer:
  cvar_confidence: 0.95             # 95% CVaR
  tail_correlation_percentile: 10   # Longin-Solnik: joint returns below 10th percentile
  em_weight_reduction_range: [0.20, 0.35]  # Expected EM reduction vs. naive CVaR

  # Regime-conditional allocation bands (Section 8.1)
  allocation_bands:
    us_equities:
      panic: [0.00, 0.05]
      defense: [0.10, 0.25]
      offense: [0.40, 0.60]
    intl_developed:
      panic: [0.00, 0.00]
      defense: [0.05, 0.15]
      offense: [0.15, 0.25]
    em_equities:
      panic: [0.00, 0.00]
      defense: [0.00, 0.08]
      offense: [0.08, 0.15]
    energy_materials:
      panic: [0.00, 0.05]
      defense: [0.05, 0.15]
      offense: [0.10, 0.20]
    healthcare:
      panic: [0.05, 0.10]
      defense: [0.10, 0.20]
      offense: [0.10, 0.18]
    cash_short_duration:
      panic: [0.70, 1.00]
      defense: [0.30, 0.60]
      offense: [0.05, 0.15]
    vix_overlay_notional:
      panic: [0.00, 0.02]
      defense: [0.02, 0.04]
      offense: [0.005, 0.015]

# --------------------------------------------------------------------------
# VIX OVERLAY PARAMETERS (Section 8.3)
# --------------------------------------------------------------------------
vix_overlay:
  max_annual_roll_drag_pct: 0.40    # 40% of Calmar improvement
  put_spread_premium_budget:
    defense: [0.02, 0.04]
    panic: [0.00, 0.02]
    offense: [0.005, 0.015]

# --------------------------------------------------------------------------
# NLP SENTIMENT PARAMETERS (Section 4, 6.2a)
# --------------------------------------------------------------------------
nlp:
  model: "ProsusAI/finbert"
  max_tokens: 512                   # Strict token limit per filing
  rolling_sentiment_window: 90      # Days for sentiment trend
  vix_drift_percentile: 75          # VIX above this = "NLP Regime Drift Risk"
  regime_weights:
    offense: 0.20                   # NLP contributes 20% of composite in Offense
    defense: 0.00                   # Monitoring only
    panic: 0.00                     # Monitoring only

# --------------------------------------------------------------------------
# MONITORING & ALERTS (Section 7.2, 9.2)
# --------------------------------------------------------------------------
monitor:
  rebalance_threshold_bps: 200      # Basis points drift to trigger rebalance
  entry_window_threshold_bps: 300   # Underweight threshold for entry signal
  extended_defense_days: 60         # Days in Defense/Panic before reassessment (Section 9.2)
  panic_exit_sequence:
    immediate_pct: 0.50             # 50% immediate on Panic
    remainder_days: [3, 5]          # Remainder over 3–5 days
  run_time_et: "16:30"              # 4:30 PM ET daily

# --------------------------------------------------------------------------
# DATA QUALITY THRESHOLDS
# --------------------------------------------------------------------------
data_quality:
  stale_sector_etf_limit: 3         # Max stale sector ETFs before suppressing signals
  backfill_method: "last_valid"     # Use most recent valid close

# --------------------------------------------------------------------------
# ALERT DELIVERY
# --------------------------------------------------------------------------
alerts:
  telegram:
    # Bot token from env: TELEGRAM_BOT_TOKEN
    # Chat ID from env: TELEGRAM_CHAT_ID
    enabled: true
  email:
    # Gmail credentials from env: GMAIL_USERNAME, GMAIL_PASSWORD
    enabled: true
  google_sheets:
    # Service account JSON from env: GOOGLE_SHEETS_CREDENTIALS
    spreadsheet_name: "Sector Rotation Daily Log"
    enabled: true

# --------------------------------------------------------------------------
# BACKTEST PARAMETERS (Section 9)
# --------------------------------------------------------------------------
backtest:
  mclean_pontiff_label: "(in-sample, apply 26% McLean-Pontiff decay to alpha differential for forward estimate)"
  stress_tests:
    policy_shock:
      sp500_drop_threshold: -0.03   # >3% single-day drop
      wedge_volume_pre_threshold: 15  # No prior deterioration below 15th percentile
    incomplete_panic:
      analog_year: 2022
    extended_bull:
      duration_years: 10
      annual_drag_range: [0.005, 0.012]  # 0.5% to 1.2% annual drag

# --------------------------------------------------------------------------
# SECTION 8.2 — PROBABILISTIC TRIGGER PARAMETERS
# --------------------------------------------------------------------------
probabilistic_triggers:
  regime_persistence_days: 2        # Default confirmation requirement
  whipsaw_buffer_percentile: 3      # Panic confirmation floor
  upgrade_path_trigger: 15          # Percentile trigger for regime upgrade path
