# ============================================================================
# Global Sector Rotation System — Master Configuration
# ============================================================================
# All thresholds, parameters, and lists are configurable here.
# No magic numbers in the codebase — everything references this file.
# ============================================================================
# PROFILE: Aggressive Growth — 27yo, beat-the-market objective
# UPDATED: 2026-02-28
# ============================================================================

# --------------------------------------------------------------------------
# PORTFOLIO CONTEXT
# --------------------------------------------------------------------------
portfolio:
  total_value: 144000
  accounts:
    taxable:
      value: 100000
      type: "Individual Brokerage"
      tax_treatment: "Capital gains taxed; long-term preferred"
    roth_ira:
      value: 44000
      type: "Retirement"
      tax_treatment: "All growth permanently tax-free"

# --------------------------------------------------------------------------
# TAX-LOCATION RULES
# --------------------------------------------------------------------------
tax_location:
  roth_ira_first:
    - "individual_stocks_thematic"      # Biotech, AI, Defense, Materials individual names
    - "high_turnover"                   # Momentum-driven, expected hold < 12 months
    - "biotech_smallcap"                # Highest volatility and rebalancing frequency
    - "momentum_tilt_only"              # Flagged as momentum, not fundamental overweight
    - "thematic_etf"                    # Thematic ETFs (ARKK, BOTZ, etc.) — high turnover
    - "high_dividend_sector"            # XLU, XLP — high dividend yield generates taxable income
  taxable:
    - "broad_etf_longterm"              # Broad ETFs held > 12 months
    - "geographic_etf"                  # EEM, INDA, EWZ, VGK — foreign tax credit eligible
    - "cash_short_duration"             # BIL, short-duration fixed income
    - "energy_materials_etf"            # Lower turnover, structural diversifier
    - "industry_etf"                    # Sub-sector industry ETFs — moderate turnover
    - "tax_loss_harvest_candidate"      # Positions with TLH opportunity
    - "growth_sector"                   # XLI, XLK, XLC, XLY — cap appreciation, low dividend yield
  split_threshold: 10000               # Never split a position across accounts unless > $10k

  # Dividend-yield tax location routing:
  # High-dividend US sector ETFs → Roth (dividends taxed as ordinary income in taxable)
  # Growth/appreciation US sector ETFs → Taxable (long-term cap gains taxed favorably)
  high_dividend_sectors:               # TTM yield > ~2.5% → Roth
    - XLU                              # Utilities ~2.8% yield
    - XLP                              # Consumer Staples ~2.6% yield
    - XLRE                             # Real Estate ~3.2% yield
  growth_sectors:                      # TTM yield < ~1.5% → Taxable
    - XLI                              # Industrials ~1.4% yield
    - XLK                              # Technology ~0.6% yield
    - XLC                              # Communication ~0.8% yield
    - XLY                              # Consumer Disc ~0.9% yield
    - XLF                              # Financials ~1.3% yield

